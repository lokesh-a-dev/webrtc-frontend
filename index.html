<!DOCTYPE html>
<html>
<head>
  <title>WebRTC 1-to-1 Call</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 95%;
      max-width: 1100px;
      background: #111827;
      border-radius: 16px;
      padding: 25px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .room-section {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 25px;
    }

    input {
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      width: 200px;
      font-size: 14px;
      outline: none;
    }

    button {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
    }

    .btn-primary:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }

    .btn-success {
      background: #22c55e;
      color: white;
    }

    .btn-success:hover {
      background: #16a34a;
      transform: translateY(-2px);
    }

    .btn-danger {
      background: #ef4444;
      color: white;
    }

    .btn-danger:hover {
      background: #dc2626;
      transform: translateY(-2px);
    }

    .video-container {
      display: flex;
      justify-content: space-between;
      gap: 15px;
      margin-bottom: 20px;
    }

    .video-box {
      flex: 1;
      position: relative;
      background: black;
      border-radius: 12px;
      overflow: hidden;
    }

    video {
      width: 100%;
      height: 350px;
      object-fit: cover;
    }

    .label {
      position: absolute;
      bottom: 8px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    #status {
      text-align: center;
      margin-top: 15px;
      font-weight: 500;
      opacity: 0.8;
    }

  </style>
</head>

<body>

<div class="container">

  <h2>1-to-1 WebRTC Call</h2>

  <div class="room-section">
    <input id="roomInput" placeholder="Enter Room ID" />
    <button class="btn-primary" onclick="joinRoom()">Join Room</button>
  </div>

  <div class="video-container">

    <div class="video-box">
      <video id="localVideo" autoplay muted playsinline></video>
      <div class="label">You</div>
    </div>

    <div class="video-box">
      <video id="remoteVideo" autoplay playsinline></video>
      <div class="label">Remote</div>
    </div>

  </div>

  <div class="controls">
    <button class="btn-success" onclick="startCall()">Start Call</button>
    <button class="btn-danger" onclick="endCall()">End Call</button>
  </div>

  <div id="status">Status: Not Connected</div>

</div>

<script>

let pc = null;
let localStream = null;
let roomId = null;
let socket = null;
let messageQueue = [];
let isSocketReady = false;

initWebSocket();

/* ===========================
   WebSocket Layer
=========================== */

function initWebSocket() {

  socket = new WebSocket("wss://signalling-server-vyew.onrender.com");

  socket.onopen = () => {
    console.log("WebSocket Connected");
    isSocketReady = true;

    // Flush queued messages
    while (messageQueue.length > 0) {
      socket.send(messageQueue.shift());
    }
  };

  socket.onclose = () => {
    console.log("WebSocket Disconnected. Reconnecting...");
    isSocketReady = false;

    setTimeout(initWebSocket, 3000); // auto-reconnect
  };

  socket.onerror = (err) => {
    console.error("WebSocket error:", err);
  };

  socket.onmessage = handleSignalingMessage;
}

function sendMessage(data) {
  const msg = JSON.stringify(data);

  if (isSocketReady && socket.readyState === WebSocket.OPEN) {
    socket.send(msg);
  } else {
    messageQueue.push(msg);
  }
}

/* ===========================
   Room Join
=========================== */

function joinRoom() {
  roomId = document.getElementById("roomInput").value;
  if (!roomId) return;

  sendMessage({
    type: "join",
    room: roomId
  });

  document.getElementById("status").innerText =
    "Joined Room: " + roomId;
}

/* ===========================
   Peer Connection
=========================== */

function createPeer() {

  pc = new RTCPeerConnection({
    iceTransportPolicy: "all",
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" },
      {
        urls: [
          "turn:openrelay.metered.ca:80?transport=udp",
          "turn:openrelay.metered.ca:443?transport=tcp"
        ],
        username: "openrelayproject",
        credential: "openrelayproject"
      }
    ]
  });

  pc.ontrack = (event) => {
    document.getElementById("remoteVideo").srcObject =
      event.streams[0];
  };

  pc.onicecandidate = (event) => {
    if (event.candidate) {
      sendMessage({
        type: "candidate",
        candidate: event.candidate
      });
    }
  };

  pc.onconnectionstatechange = () => {
    document.getElementById("status").innerText =
      "Connection: " + pc.connectionState;
  };
}

/* ===========================
   Start Call
=========================== */

async function startCall() {

  if (!roomId) {
    alert("Join a room first");
    return;
  }

  if (pc) return;

  try {

    localStream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });

    document.getElementById("localVideo").srcObject = localStream;

    createPeer();

    localStream.getTracks().forEach(track => {
      pc.addTrack(track, localStream);
    });

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    sendMessage({
      type: "offer",
      offer: offer
    });

  } catch (err) {
    console.error("Error starting call:", err);
  }
}

/* ===========================
   Signaling Handler
=========================== */

async function handleSignalingMessage(message) {

  const data = JSON.parse(message.data);

  if (!pc && data.type === "offer") {

    createPeer();

    localStream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });

    document.getElementById("localVideo").srcObject = localStream;

    localStream.getTracks().forEach(track => {
      pc.addTrack(track, localStream);
    });
  }

  try {

    if (data.type === "offer") {

      await pc.setRemoteDescription(data.offer);

      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      sendMessage({
        type: "answer",
        answer: answer
      });
    }

    if (data.type === "answer") {
      await pc.setRemoteDescription(data.answer);
    }

    if (data.type === "candidate") {
      if (pc.remoteDescription) {
        await pc.addIceCandidate(data.candidate);
      }
    }

  } catch (err) {
    console.error("Signaling error:", err);
  }
}

/* ===========================
   End Call
=========================== */

function endCall() {

  if (pc) {
    pc.close();
    pc = null;
  }

  if (localStream) {
    localStream.getTracks().forEach(track => track.stop());
    localStream = null;
  }

  document.getElementById("localVideo").srcObject = null;
  document.getElementById("remoteVideo").srcObject = null;

  document.getElementById("status").innerText = "Status: Idle";
}

</script>

</body>
</html>
