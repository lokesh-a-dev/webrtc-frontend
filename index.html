<!DOCTYPE html>
<html>
<head>
  <title>WebRTC Mobile Call</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      background: black;
      height: 100vh;
      overflow: hidden;
      position: relative;
      color: white;
    }

    /* Remote video = full screen */
    #remoteVideo {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: black;
    }

    /* Local preview floating */
    #localVideo {
      position: absolute;
      width: 120px;
      height: 160px;
      bottom: 110px;
      right: 15px;
      border-radius: 12px;
      object-fit: cover;
      border: 2px solid white;
      background: black;
    }

    /* Top room section */
    .top-bar {
      position: absolute;
      top: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 8px;
      padding: 0 15px;
      z-index: 10;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 25px;
      border: none;
      outline: none;
      font-size: 14px;
    }

    .join-btn {
      padding: 10px 16px;
      border-radius: 25px;
      border: none;
      background: #2563eb;
      color: white;
      font-weight: 600;
    }

    /* Bottom control bar */
    .controls {
      position: absolute;
      bottom: 30px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 25px;
      z-index: 10;
    }

    .control-btn {
      width: 65px;
      height: 65px;
      border-radius: 50%;
      border: none;
      font-size: 18px;
      font-weight: bold;
      color: white;
    }

    .start-btn {
      background: #22c55e;
    }

    .end-btn {
      background: #ef4444;
    }

    .status {
      position: absolute;
      bottom: 5px;
      width: 100%;
      text-align: center;
      font-size: 13px;
      opacity: 0.8;
    }

  </style>
</head>

<body>

  <!-- Remote video full screen -->
  <video id="remoteVideo" autoplay playsinline></video>

  <!-- Local preview floating -->
  <video id="localVideo" autoplay muted playsinline></video>

  <!-- Top join bar -->
  <div class="top-bar">
    <input id="roomInput" placeholder="Room ID">
    <button class="join-btn" onclick="joinRoom()">Join</button>
  </div>

  <!-- Bottom controls -->
  <div class="controls">
    <button class="control-btn start-btn" onclick="startCall()">▶</button>
    <button class="control-btn end-btn" onclick="endCall()">✕</button>
  </div>

  <div class="status" id="status">Status: Not Connected</div>

<script>

let pc = null;
let localStream = null;
let roomId = null;
let socket = null;
let messageQueue = [];
let isSocketReady = false;

initWebSocket();

/* ===========================
   WebSocket Layer
=========================== */

function initWebSocket() {

  socket = new WebSocket("wss://signalling-server-vyew.onrender.com");

  socket.onopen = () => {
    console.log("WebSocket Connected");
    isSocketReady = true;

    // Flush queued messages
    while (messageQueue.length > 0) {
      socket.send(messageQueue.shift());
    }
  };

  socket.onclose = () => {
    console.log("WebSocket Disconnected. Reconnecting...");
    isSocketReady = false;

    setTimeout(initWebSocket, 3000); // auto-reconnect
  };

  socket.onerror = (err) => {
    console.error("WebSocket error:", err);
  };

  socket.onmessage = handleSignalingMessage;
}

function sendMessage(data) {
  const msg = JSON.stringify(data);

  if (isSocketReady && socket.readyState === WebSocket.OPEN) {
    socket.send(msg);
  } else {
    messageQueue.push(msg);
  }
}

/* ===========================
   Room Join
=========================== */

function joinRoom() {
  roomId = document.getElementById("roomInput").value;
  if (!roomId) return;

  sendMessage({
    type: "join",
    room: roomId
  });

  document.getElementById("status").innerText =
    "Joined Room: " + roomId;
}

/* ===========================
   Peer Connection
=========================== */

function createPeer() {

  pc = new RTCPeerConnection({
    iceTransportPolicy: "all",
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" },
      {
        urls: [
          "turn:openrelay.metered.ca:80?transport=udp",
          "turn:openrelay.metered.ca:443?transport=tcp"
        ],
        username: "openrelayproject",
        credential: "openrelayproject"
      }
    ]
  });

  pc.ontrack = (event) => {
    document.getElementById("remoteVideo").srcObject =
      event.streams[0];
  };

  pc.onicecandidate = (event) => {
    if (event.candidate) {
      sendMessage({
        type: "candidate",
        candidate: event.candidate
      });
    }
  };

  pc.onconnectionstatechange = () => {
    document.getElementById("status").innerText =
      "Connection: " + pc.connectionState;
  };
}

/* ===========================
   Start Call
=========================== */

async function startCall() {

  if (!roomId) {
    alert("Join a room first");
    return;
  }

  if (pc) return;

  try {

    localStream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });

    document.getElementById("localVideo").srcObject = localStream;

    createPeer();

    localStream.getTracks().forEach(track => {
      pc.addTrack(track, localStream);
    });

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    sendMessage({
      type: "offer",
      offer: offer
    });

  } catch (err) {
    console.error("Error starting call:", err);
  }
}

/* ===========================
   Signaling Handler
=========================== */

async function handleSignalingMessage(message) {

  const data = JSON.parse(message.data);

  if (!pc && data.type === "offer") {

    createPeer();

    localStream = await navigator.mediaDevices.getUserMedia({
      video: true,
      audio: true
    });

    document.getElementById("localVideo").srcObject = localStream;

    localStream.getTracks().forEach(track => {
      pc.addTrack(track, localStream);
    });
  }

  try {

    if (data.type === "offer") {

      await pc.setRemoteDescription(data.offer);

      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      sendMessage({
        type: "answer",
        answer: answer
      });
    }

    if (data.type === "answer") {
      await pc.setRemoteDescription(data.answer);
    }

    if (data.type === "candidate") {
      if (pc.remoteDescription) {
        await pc.addIceCandidate(data.candidate);
      }
    }

  } catch (err) {
    console.error("Signaling error:", err);
  }
}

/* ===========================
   End Call
=========================== */

function endCall() {

  if (pc) {
    pc.close();
    pc = null;
  }

  if (localStream) {
    localStream.getTracks().forEach(track => track.stop());
    localStream = null;
  }

  document.getElementById("localVideo").srcObject = null;
  document.getElementById("remoteVideo").srcObject = null;

  document.getElementById("status").innerText = "Status: Idle";
}

</script>

</body>
</html>
