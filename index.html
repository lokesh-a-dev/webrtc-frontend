<!DOCTYPE html>
<html>
<head>
  <title>Simple WebRTC</title>
</head>
<body>

<h3>Room ID:</h3>
<input id="roomInput" placeholder="Enter room id" />
<button onclick="joinRoom()">Join</button>

<br><br>

<video id="localVideo" autoplay playsinline muted width="300"></video>
<video id="remoteVideo" autoplay playsinline width="300"></video>

<script>
let ws;
let pc;
let localStream;
let roomId;

const configuration = {
  iceServers: [
    { urls: "stun:stun.l.google.com:19302" },
    {
      urls: "turn:openrelay.metered.ca:443?transport=tcp",
      username: "openrelayproject",
      credential: "openrelayproject"
    }
  ]
};

async function joinRoom() {
  roomId = document.getElementById("roomInput").value;
  if (!roomId) return alert("Enter room ID");

  ws = new WebSocket("wss://signalling-server-vyew.onrender.com");

  ws.onopen = async () => {
    ws.send(JSON.stringify({
      type: "join",
      room: roomId
    }));

    await startWebRTC();
  };

  ws.onmessage = async (message) => {
    const data = JSON.parse(message.data);

    if (data.type === "offer") {
      await pc.setRemoteDescription(
        new RTCSessionDescription(data.offer)
      );

      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);

      ws.send(JSON.stringify({
        type: "answer",
        answer: answer
      }));
    }

    if (data.type === "answer") {
      await pc.setRemoteDescription(
        new RTCSessionDescription(data.answer)
      );
    }

    if (data.type === "ice-candidate") {
      await pc.addIceCandidate(
        new RTCIceCandidate(data.candidate)
      );
    }
  };
}

async function startWebRTC() {
  localStream = await navigator.mediaDevices.getUserMedia({
    video: true,
    audio: true
  });

  document.getElementById("localVideo").srcObject = localStream;

  pc = new RTCPeerConnection(configuration);

  localStream.getTracks().forEach(track => {
    pc.addTrack(track, localStream);
  });

  pc.ontrack = (event) => {
    document.getElementById("remoteVideo").srcObject =
      event.streams[0];
  };

  pc.onicecandidate = (event) => {
    if (event.candidate) {
      ws.send(JSON.stringify({
        type: "ice-candidate",
        candidate: event.candidate
      }));
    }
  };

  // First user creates offer automatically
  setTimeout(async () => {
    if (pc.signalingState === "stable") {
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);

      ws.send(JSON.stringify({
        type: "offer",
        offer: offer
      }));
    }
  }, 1000);
}
</script>

</body>
</html>
